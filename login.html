<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in | Promptbanken</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <main class="auth-shell" aria-labelledby="login-title">
        <section class="auth-panel">
            <a class="auth-brand" href="index.html">Promptbanken</a>
            <p class="auth-kicker">Inloggat läge</p>
            <h1 id="login-title">Logga in</h1>
            <div class="auth-tabs" aria-label="Inloggningsläge">
                <button type="button" class="active" data-auth-mode="login">Logga in</button>
                <button type="button" data-auth-mode="signup">Skapa free-konto</button>
                <button type="button" data-auth-mode="reset">Glömt lösenord</button>
            </div>
            <form class="auth-form" data-login-form>
                <label>
                    E-post
                    <input type="email" autocomplete="email" required data-login-email>
                </label>
                <label data-password-field>
                    Lösenord
                    <input type="password" autocomplete="current-password" required data-login-password>
                </label>
                <button type="submit" data-auth-submit>Logga in</button>
                <p class="auth-status" role="status" data-login-status></p>
            </form>

            <div class="auth-divider"><span>eller</span></div>
            <button class="auth-google-btn" type="button" data-google-signin>
                <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
                Fortsätt med Google
            </button>

            <div class="auth-plan-compare" aria-label="Planjämförelse">
                <div class="auth-plan-col">
                    <strong>Free</strong>
                    <ul>
                        <li>✓ 3 prompts</li>
                        <li>✓ MCP-nyckel</li>
                        <li>✗ API-nycklar</li>
                        <li>✗ Dela med workspace</li>
                    </ul>
                </div>
                <div class="auth-plan-col auth-plan-col--pro">
                    <strong>Pro</strong>
                    <ul>
                        <li>✓ 100 prompts</li>
                        <li>✓ MCP-nyckel</li>
                        <li>✓ API-nycklar</li>
                        <li>✓ Dela med workspace</li>
                    </ul>
                </div>
            </div>
        </section>
    </main>
    <script type="module" src="/src/login.js"></script>
</body>
</html>
